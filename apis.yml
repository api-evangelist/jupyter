aid: jupyter
name: Jupyter
description: >-
  Project Jupyter is an open-source project that provides a web application for
  creating and sharing documents containing live code, equations, visualizations
  and narrative text. The Jupyter ecosystem includes Jupyter Notebook,
  JupyterHub, JupyterLab, and Jupyter Server.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Interactive Computing
  - Notebooks
  - Data Science
  - Python
  - Scientific Computing
  - Education
url: https://raw.githubusercontent.com/api-evangelist/jupyter/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: jupyter:notebook-api
    name: Jupyter Notebook API
    description: >-
      REST API for interacting with Jupyter Notebook servers, managing kernels,
      sessions, contents, and terminals.
    humanURL: https://jupyter-notebook.readthedocs.io/
    baseURL: http://localhost:8888
    tags:
      - Notebooks
      - Interactive Computing
      - REST API
    properties:
      - type: Documentation
        url: https://jupyter-notebook.readthedocs.io/en/stable/extending/rest_api.html
      - type: OpenAPI
        url: https://raw.githubusercontent.com/jupyter/notebook/master/notebook/services/api/api.yaml
  - aid: jupyter:jupyterhub-api
    name: JupyterHub API
    description: >-
      REST API for managing multi-user Jupyter notebook servers including
      users, servers, and services.
    humanURL: https://jupyterhub.readthedocs.io/
    baseURL: http://localhost:8000/hub/api
    tags:
      - Multi-user
      - Authentication
      - Hub
    properties:
      - type: Documentation
        url: https://jupyterhub.readthedocs.io/en/stable/reference/rest-api.html
      - type: OpenAPI
        url: https://raw.githubusercontent.com/jupyterhub/jupyterhub/master/docs/rest-api.yml
  - aid: jupyter:jupyter-server-api
    name: Jupyter Server API
    description: >-
      Core REST API for Jupyter Server providing kernels, sessions, contents,
      and terminal management.
    humanURL: https://jupyter-server.readthedocs.io/
    baseURL: http://localhost:8888
    tags:
      - Server
      - REST API
      - Kernels
    properties:
      - type: Documentation
        url: https://jupyter-server.readthedocs.io/en/latest/developers/rest-api.html
common:
