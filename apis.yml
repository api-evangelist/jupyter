    url: https://jupyter.org
  - type: Documentation
    url: https://docs.jupyter.org/
  - type: Blog
    url: https://blog.jupyter.org/
  - type: GitHub Organization
    url: https://github.com/jupyter
  - type: Community
    url: https://jupyter.org/community
